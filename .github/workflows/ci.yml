name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deterministic:
    name: deterministic-python-${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Tests
        run: pytest

      - name: Check model registry
        run: |
          llm-lab models
          llm-lab models --format json

      - name: Generate sample eval report
        run: |
          llm-lab eval \
            --dataset data/sample_dataset.jsonl \
            --provider fake \
            --model-alias ci \
            --report-dir reports \
            --report-stem sample-fake-python-${{ matrix.python-version }} \
            --registry experiments/registry-python-${{ matrix.python-version }}.jsonl

      - name: Generate deterministic regression eval report
        run: |
          llm-lab eval \
            --dataset data/expanded_dataset.jsonl \
            --provider fake \
            --model-alias ci \
            --min-pass-rate 1.0 \
            --baseline-report baselines/fake-expanded-baseline.json \
            --allowed-regression 0.0 \
            --report-dir reports \
            --report-stem expanded-fake-python-${{ matrix.python-version }} \
            --registry experiments/registry-python-${{ matrix.python-version }}.jsonl

      - name: Generate model comparison scoreboard
        run: |
          llm-lab compare \
            --reports \
              reports/sample-fake-python-${{ matrix.python-version }}.json \
              reports/expanded-fake-python-${{ matrix.python-version }}.json \
            --output-csv reports/model-comparison-python-${{ matrix.python-version }}.csv \
            --output-md reports/model-comparison-python-${{ matrix.python-version }}.md

      - name: Run deterministic RAG eval
        run: |
          llm-lab rag-eval \
            --dataset data/rag_eval_dataset.jsonl \
            --docs \
              data/rag_corpus/rag.md \
              data/rag_corpus/evals.md \
              data/rag_corpus/security.md \
              data/rag_corpus/safety.md \
            --top-k 2 \
            --min-pass-rate 1.0 \
            --report-dir reports \
            --report-stem rag-sample-python-${{ matrix.python-version }}

      - name: Run deterministic safety red-team eval
        run: |
          llm-lab redteam \
            --dataset data/redteam_dataset.jsonl \
            --provider fake \
            --model-alias ci \
            --min-pass-rate 1.0 \
            --report-dir reports \
            --report-stem redteam-fake-python-${{ matrix.python-version }}

      - name: Generate release readiness dashboard
        run: |
          llm-lab readiness \
            --reports \
              reports/sample-fake-python-${{ matrix.python-version }}.json \
              reports/expanded-fake-python-${{ matrix.python-version }}.json \
              reports/rag-sample-python-${{ matrix.python-version }}.json \
              reports/redteam-fake-python-${{ matrix.python-version }}.json \
            --min-pass-rate 1.0 \
            --report-dir reports \
            --report-stem release-readiness-python-${{ matrix.python-version }}

      - name: Upload eval report artifact
        uses: actions/upload-artifact@v4
        with:
          name: eval-reports-python-${{ matrix.python-version }}
          path: |
            reports/
            experiments/
          if-no-files-found: error

  openai-smoke:
    name: openai-smoke-manual
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Run live OpenAI smoke test
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: python scripts/openai_smoke.py
