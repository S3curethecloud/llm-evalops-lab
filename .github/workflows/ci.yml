name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deterministic:
    name: deterministic-python-${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Tests
        run: pytest

      - name: Generate deterministic eval report
        run: |
          llm-lab eval \
            --dataset data/expanded_dataset.jsonl \
            --provider fake \
            --min-pass-rate 1.0 \
            --baseline-report baselines/fake-expanded-baseline.json \
            --allowed-regression 0.0 \
            --report-dir reports \
            --report-stem expanded-fake-python-${{ matrix.python-version }}

      - name: Upload eval report artifact
        uses: actions/upload-artifact@v4
        with:
          name: eval-reports-python-${{ matrix.python-version }}
          path: reports/
          if-no-files-found: error

  openai-smoke:
    name: openai-smoke-manual
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Run live OpenAI smoke test
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: python scripts/openai_smoke.py
